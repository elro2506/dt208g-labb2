<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/x-icon" href="bilder/logotyp.svg">

  <link rel="stylesheet" href="/src/style.css">
  <title>Laboration 2 - ToDo</title>
</head>

<body>
  <img src="bilder/logotyp.svg" alt="logotyp" class="logotyp">
  <main>
    <div class="contact-form">
      <form id="form">
        <label for="duty">Uppgift att göra</label>
        <input type="text" id="duty" placeholder="Uppgift">
        <label for="duty">Ansvarig för uppgift</label>
        <input type="text" id="responsible" placeholder="Ansvarig">
        <label for="duty">Prioritet (1 är högst, 3 är lägst)</label>
        <input type="text" id="priority" placeholder="Prioritet">

        <button type="submit">Lägg till i listan</button>
      </form>
    </div>
    <div class="uppgifter">
      <div>
        <h2>Att göra</h2>
        <ul id="todo-list">

        </ul>
      </div>

      <div>
        <h2>Avklarat</h2>

        <ul id="completed-list">

        </ul>
        <button id="clear">Rensa avklarade</button>
      </div>
    </div>
  </main>
  <script src="/src/main.ts" type="module"></script>
</body>

</html>
